<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme Web3 Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Navbar -->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">ACME WE3 STORE</h1>
            <div class="space-x-4">
                <span class="text-sm font-medium bg-blue-800 px-3 py-1 rounded">Balance: 5,000 WUSD</span>
                <button onclick="document.getElementById('loginModal').classList.remove('hidden')" class="hover:text-blue-200 font-semibold">Login (Admin)</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto mt-8 p-4">
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Latest Hardware Wallets</h2>
            <p class="text-gray-600 mt-2">Secure your digital assets with our premium selection.</p>
        </div>

        <!-- Products Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="productsGrid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <!-- Cart Overlay -->
    <div id="cartNotification" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-xl hidden transform transition-transform">
        Item added to cart!
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md">
            <h3 class="text-2xl font-bold text-gray-800 mb-4">Complete Purchase</h3>
            <p class="text-gray-600 mb-6" id="checkoutDetails">Processing WUSD payment...</p>
            <div class="bg-gray-100 p-4 rounded mb-6 border border-gray-200">
                <p class="text-sm text-gray-500">Weilchain Network</p>
                <p class="text-lg font-mono font-bold text-gray-800" id="checkoutAmount">0.00 WUSD</p>
            </div>
            <div class="flex justify-end space-x-3">
                <button onclick="closeCheckout()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                <button onclick="confirmPayment()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-bold shadow">Pay with WUSD</button>
            </div>
        </div>
    </div>

    <!-- Login Modal (Vulnerable) -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-sm relative">
            <button onclick="document.getElementById('loginModal').classList.add('hidden')" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">✕</button>
            <h3 class="text-xl font-bold text-gray-800 mb-4">Admin Access</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" id="uname" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="pword" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button onclick="attemptLogin()" class="w-full bg-gray-800 text-white py-2 rounded hover:bg-gray-900 font-bold">Sign In</button>
                <p id="loginOutput" class="text-sm text-center text-red-500 mt-2 font-mono"></p>
            </div>
        </div>
    </div>

    <script>
        // Mock Products
        const products = [
            { id: 1, name: "WeilSafe Titanium", desc: "Military-grade cold storage for your stablecoins.", price: 149 },
            { id: 2, name: "WeilNode Mini", desc: "Run a full Weilchain node from your desk.", price: 299 },
            { id: 3, name: "Crypto Steel Capsule", desc: "Indestructible seed phrase backup.", price: 89 }
        ];

        let currentPrice = 0;

        function renderProducts() {
            const grid = document.getElementById("productsGrid");
            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                    <div class="h-48 bg-gray-200 flex items-center justify-center">
                        <span class="text-gray-400 font-mono text-4xl">📦</span>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-lg text-gray-800">${p.name}</h3>
                        <p class="text-gray-500 text-sm mt-1 h-10">${p.desc}</p>
                        <div class="mt-4 flex justify-between items-center">
                            <span class="text-xl font-extrabold text-blue-900">${p.price} WUSD</span>
                            <button onclick="buyNow(${p.price}, '${p.name}')" class="bg-green-600 text-white px-4 py-2 rounded font-semibold hover:bg-green-700">Buy</button>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function buyNow(price, name) {
            currentPrice = price;
            document.getElementById('checkoutDetails').innerText = `Purchasing 1x ${name}`;
            document.getElementById('checkoutAmount').innerText = `${price}.00 WUSD`;
            document.getElementById('checkoutModal').classList.remove('hidden');
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.add('hidden');
        }

        async function confirmPayment() {
            try {
                const res = await fetch('/checkout', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ price: currentPrice, payment: 'WUSD' })
                });
                const data = await res.json();
                
                closeCheckout();
                
                const notif = document.getElementById('cartNotification');
                notif.innerText = `Payment of ${currentPrice} WUSD Success! Tx Hash generated.`;
                notif.classList.remove('hidden');
                setTimeout(() => notif.classList.add('hidden'), 3000);
            } catch (e) {
                console.error(e);
            }
        }

        async function attemptLogin() {
            const user = document.getElementById('uname').value;
            const pass = document.getElementById('pword').value;
            
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            
            if (data.message === "Welcome user") {
                document.getElementById('loginOutput').className = "text-sm text-center text-green-500 mt-2 font-mono";
                document.getElementById('loginOutput').innerText = "SUCCESS: " + data.message;
            } else {
                document.getElementById('loginOutput').className = "text-sm text-center text-red-500 mt-2 font-mono";
                document.getElementById('loginOutput').innerText = "ERROR: " + data.message;
            }
        }

        renderProducts();
    </script>
</body>
</html>
